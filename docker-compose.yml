services:
  wordpress-lead-api:
    build: .
    container_name: wordpress-lead-api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
